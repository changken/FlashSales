services:
  app:
    build: .
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: "Host=db;Port=5432;Database=flashsales;Username=flashsales;Password=flashsales"
      REDIS_URL: "redis:6379"
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flashsales
      POSTGRES_PASSWORD: flashsales
      POSTGRES_DB: flashsales
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashsales -d flashsales"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
